<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ollama Search Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --accent: #2563eb;
      --search-bg: #eff6ff;
      --search-border: #bfdbfe;
      --search-text: #1d4ed8;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #dc2626;
      --code-bg: #f3f4f6;
      --radius: 12px;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-left .logo { font-size: 20px; }

    .header-left .title {
      font-weight: 600;
      font-size: 15px;
    }

    .model-badge {
      background: var(--code-bg);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .verbose-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .verbose-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }

    .messages {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* Markdown inside assistant bubbles */
    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 14px 0 6px; font-size: 1em; font-weight: 600; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      font-size: 0.88em;
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .bubble strong { font-weight: 600; }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .bubble th { background: var(--code-bg); font-weight: 600; }

    /* Blinking cursor during stream */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text-muted);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Thinking indicator (three dots) */
    .thinking {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
    }

    .thinking span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Search status chip ── */
    .search-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      color: var(--search-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    .search-status .spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--search-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error chip ── */
    .error-msg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    /* ── Input area ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px;
      flex-shrink: 0;
    }

    .input-row {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }

    #input::placeholder { color: var(--text-muted); }

    #sendBtn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #sendBtn:disabled { opacity: 0.4; cursor: default; }
    #sendBtn:not(:disabled):hover { opacity: 0.85; }

    /* ── Welcome state ── */
    .welcome {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
    }

    .welcome .welcome-icon { font-size: 40px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .welcome p { font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">🤖</span>
    <span class="title">ollama Search Tool</span>
    <span class="model-badge" id="modelBadge">gemma4:26b</span>
  </div>
  <div class="header-right">
    <label class="verbose-label">
      <input type="checkbox" id="verboseToggle"> Verbose
    </label>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>
</header>

<div id="chat">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🔍</div>
      <h2>Ask anything</h2>
      <p>I'll search the web when I need up-to-date information.</p>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="sendBtn">Send</button>
  </div>
</footer>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('sendBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const verboseChk  = document.getElementById('verboseToggle');
  const welcomeEl   = document.getElementById('welcome');
  const modelBadge  = document.getElementById('modelBadge');

  let isStreaming = false;

  // ── Fetch initial status ─────────────────────────────────────────────────
  fetch('/status').then(r => r.json()).then(s => {
    modelBadge.textContent  = s.model;
    verboseChk.checked      = s.verbose;
  }).catch(() => {});

  // ── Auto-resize textarea ─────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  // ── Enter to send ─────────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => { if (!isStreaming) sendMessage(); });

  // ── Reset ─────────────────────────────────────────────────────────────────
  resetBtn.addEventListener('click', async () => {
    if (isStreaming) return;
    await fetch('/reset', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
  });

  // ── Verbose toggle ────────────────────────────────────────────────────────
  verboseChk.addEventListener('change', () => {
    fetch('/verbose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: verboseChk.checked })
    });
  });

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function addMessage(role, html) {
    welcomeEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function addStatusChip(className, html) {
    welcomeEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    const chip = document.createElement('div');
    chip.className = className;
    chip.innerHTML = html;
    wrapper.appendChild(chip);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return chip;
  }

  function scrollToBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Send & stream ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    setStreaming(true);

    // User bubble
    addMessage('user', escapeHtml(text));

    // Thinking indicator
    let thinkingEl = addStatusChip('thinking', '<span></span><span></span><span></span>');

    let assistantBubble = null;
    let rawContent = '';
    let currentSearchChip = null;

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }
          handleEvent(event);
        }
      }
    } catch (err) {
      removeThinking();
      addStatusChip('error-msg', `❌ ${escapeHtml(err.message)}`);
    } finally {
      setStreaming(false);
    }

    function handleEvent(event) {
      switch (event.type) {

        case 'thinking':
          // Re-show thinking if it was removed (multi-step)
          if (!thinkingEl) {
            thinkingEl = addStatusChip('thinking', '<span></span><span></span><span></span>');
          }
          break;

        case 'token':
          removeThinking();
          if (!assistantBubble) {
            assistantBubble = addMessage('assistant', '').parentElement.querySelector('.bubble');
            rawContent = '';
          }
          rawContent += event.content;
          assistantBubble.innerHTML =
            marked.parse(rawContent) + '<span class="cursor"></span>';
          scrollToBottom();
          break;

        case 'search_start':
          removeThinking();
          // Finalise any partial answer before showing search
          if (assistantBubble) {
            assistantBubble.innerHTML = marked.parse(rawContent);
            assistantBubble = null;
            rawContent = '';
          }
          currentSearchChip = addStatusChip(
            'search-status',
            `<span class="spinner"></span> Searching: <strong>${escapeHtml(event.query)}</strong>`
          );
          break;

        case 'search_done':
          if (currentSearchChip) {
            const icon = event.count > 0 ? '✅' : '⚠️';
            const label = event.count > 0
              ? `Found ${event.count} result${event.count !== 1 ? 's' : ''}`
              : 'No results';
            currentSearchChip.innerHTML =
              `${icon} ${label} for <strong>${escapeHtml(event.query)}</strong>`;
            currentSearchChip = null;
          }
          // New thinking indicator for the synthesis step
          thinkingEl = addStatusChip('thinking', '<span></span><span></span><span></span>');
          break;

        case 'done':
          removeThinking();
          if (assistantBubble) {
            assistantBubble.innerHTML = marked.parse(rawContent);
            assistantBubble = null;
          }
          scrollToBottom();
          break;

        case 'error':
          removeThinking();
          if (assistantBubble) {
            assistantBubble.innerHTML = marked.parse(rawContent);
            assistantBubble = null;
          }
          addStatusChip('error-msg', `❌ ${escapeHtml(event.message)}`);
          break;
      }
    }

    function removeThinking() {
      if (thinkingEl) {
        thinkingEl.closest('.message')?.remove();
        thinkingEl = null;
      }
    }
  }

  function setStreaming(val) {
    isStreaming = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
