<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ollama Search Tool</title>
  <script src="/static/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --accent: #2563eb;
      --search-bg: #eff6ff;
      --search-border: #bfdbfe;
      --search-text: #1d4ed8;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #dc2626;
      --code-bg: #f3f4f6;
      --radius: 12px;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-left .logo { font-size: 20px; }

    .header-left .title {
      font-weight: 600;
      font-size: 15px;
    }

    .model-badge {
      background: var(--code-bg);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .verbose-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .verbose-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Global status bar ── */
    #statusBar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: #eff6ff;
      border-bottom: 1px solid #bfdbfe;
      font-size: 12px;
      color: #1d4ed8;
      flex-shrink: 0;
    }

    #statusBar .bar-spinner {
      width: 13px;
      height: 13px;
      border: 2px solid #bfdbfe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      will-change: transform;
      flex-shrink: 0;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }

    .messages {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* Markdown inside assistant bubbles */
    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 14px 0 6px; font-size: 1em; font-weight: 600; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      font-size: 0.88em;
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .bubble strong { font-weight: 600; }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .bubble th { background: var(--code-bg); font-weight: 600; }

    /* Blinking cursor during stream */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text-muted);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .thinking .t-spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      will-change: transform;
      flex-shrink: 0;
    }

    /* ── Search status chip ── */
    .search-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      color: var(--search-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    .search-status .spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--search-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      will-change: transform;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error chip ── */
    .error-msg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    /* ── Warning chip ── */
    .warning-msg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    /* ── Input area ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* RAG documents panel */
    #ragDocs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 2px;
    }

    .rag-doc-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 99px;
      padding: 3px 10px 3px 8px;
      font-size: 12px;
      color: #166534;
    }

    .rag-doc-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: #4ade80;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .rag-doc-chip button:hover { color: #166534; }

    /* File chips row */
    #fileChips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px 3px 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .file-chip button:hover { color: var(--text); }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #attachBtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 11px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    #attachBtn:hover { border-color: var(--accent); color: var(--accent); }
    #attachBtn:disabled { opacity: 0.4; cursor: default; }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }

    #input::placeholder { color: var(--text-muted); }

    #sendBtn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #sendBtn:disabled { opacity: 0.4; cursor: default; }
    #sendBtn:not(:disabled):hover { opacity: 0.85; }

    /* ── Welcome state ── */
    .welcome {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
    }

    .welcome .welcome-icon { font-size: 40px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .welcome p { font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">🤖</span>
    <span class="title">ollama Search Tool</span>
    <span class="model-badge" id="modelBadge">gemma4:26b</span>
  </div>
  <div class="header-right">
    <label class="verbose-label">
      <input type="checkbox" id="verboseToggle"> Verbose
    </label>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>
</header>

<div id="statusBar">
  <div class="bar-spinner"></div>
  <span id="statusText">Thinking…</span>
</div>

<div id="chat">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🔍</div>
      <h2>Ask anything</h2>
      <p>I'll search the web when I need up-to-date information.</p>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrapper">
    <div id="ragDocs" style="display:none"></div>
    <div id="fileChips" style="display:none"></div>
    <div class="input-row">
      <button id="attachBtn" title="Attach file">📎</button>
      <input type="file" id="fileInput" hidden multiple
        accept=".pdf,.html,.htm,.txt,.md,.py,.js,.ts,.json,.csv,.png,.jpg,.jpeg,.gif,.webp">
      <textarea id="input" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</footer>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  const statusBar   = document.getElementById('statusBar');
  const statusText  = document.getElementById('statusText');
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('sendBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const verboseChk  = document.getElementById('verboseToggle');
  const welcomeEl   = document.getElementById('welcome');
  const modelBadge  = document.getElementById('modelBadge');
  const attachBtn   = document.getElementById('attachBtn');
  const fileInput   = document.getElementById('fileInput');
  const fileChipsEl = document.getElementById('fileChips');
  const ragDocsEl   = document.getElementById('ragDocs');

  let isStreaming = false;
  let stagedFiles = [];    // File objects staged for the next send
  let ragDocuments = new Map(); // name → chunk count, persists across turns

  // ── Fetch initial status ─────────────────────────────────────────────────
  fetch('/status').then(r => r.json()).then(s => {
    modelBadge.textContent  = s.model;
    verboseChk.checked      = s.verbose;
  }).catch(() => {});

  // ── Auto-resize textarea ─────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  // ── Enter to send ─────────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => { if (!isStreaming) sendMessage(); });

  // ── Reset ─────────────────────────────────────────────────────────────────
  resetBtn.addEventListener('click', async () => {
    if (isStreaming) return;
    await fetch('/reset', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
    ragDocuments.clear();
    renderRagDocs();
  });

  // ── Verbose toggle ────────────────────────────────────────────────────────
  verboseChk.addEventListener('change', () => {
    fetch('/verbose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: verboseChk.checked })
    });
  });

  // ── File attach ───────────────────────────────────────────────────────────
  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    for (const file of fileInput.files) {
      if (!stagedFiles.find(f => f.name === file.name)) {
        stagedFiles.push(file);
      }
    }
    fileInput.value = ''; // reset so same file can be re-added after removal
    renderFileChips();
  });

  // ── RAG document panel ────────────────────────────────────────────────────
  function renderRagDocs() {
    ragDocsEl.innerHTML = '';
    if (ragDocuments.size === 0) {
      ragDocsEl.style.display = 'none';
      return;
    }
    ragDocsEl.style.display = 'flex';
    ragDocuments.forEach((chunks, name) => {
      const chip = document.createElement('div');
      chip.className = 'rag-doc-chip';
      chip.innerHTML = `📚 ${escapeHtml(name)} <span style="opacity:.6">(${chunks} chunks)</span> <button aria-label="Remove">✕</button>`;
      chip.querySelector('button').addEventListener('click', async () => {
        await fetch(`/rag/documents/${encodeURIComponent(name)}`, { method: 'DELETE' });
        ragDocuments.delete(name);
        renderRagDocs();
      });
      ragDocsEl.appendChild(chip);
    });
  }

  function renderFileChips() {
    fileChipsEl.innerHTML = '';
    if (stagedFiles.length === 0) {
      fileChipsEl.style.display = 'none';
      return;
    }
    fileChipsEl.style.display = 'flex';
    stagedFiles.forEach((file, idx) => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `📎 ${escapeHtml(file.name)} <button aria-label="Remove">✕</button>`;
      chip.querySelector('button').addEventListener('click', () => {
        stagedFiles.splice(idx, 1);
        renderFileChips();
      });
      fileChipsEl.appendChild(chip);
    });
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function addMessage(role, html) {
    welcomeEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function addStatusChip(className, html) {
    welcomeEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    const chip = document.createElement('div');
    chip.className = className;
    chip.innerHTML = html;
    wrapper.appendChild(chip);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return chip;
  }

  function scrollToBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Send & stream ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && stagedFiles.length === 0) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Build user bubble: optional file chips + text
    const filesToSend = [...stagedFiles];
    stagedFiles = [];
    renderFileChips();

    let userHtml = '';
    if (filesToSend.length > 0) {
      userHtml += filesToSend.map(f =>
        `<div class="file-chip" style="margin-bottom:6px">📎 ${escapeHtml(f.name)}</div>`
      ).join('');
    }
    if (text) userHtml += escapeHtml(text);
    addMessage('user', userHtml);

    setStreaming(true, 'Thinking…');

    // Thinking indicator
    let thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');

    let assistantBubble = null;
    let rawContent = '';
    let currentSearchChip = null;

    try {
      // Use FormData so files can be included
      const form = new FormData();
      form.append('message', text || ' ');
      for (const file of filesToSend) form.append('files', file);

      const response = await fetch('/chat', { method: 'POST', body: form });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }
          handleEvent(event);
        }
      }
    } catch (err) {
      console.error('[SSE] stream error:', err);
      removeThinking();
      addStatusChip('error-msg', `❌ ${escapeHtml(err.message)}`);
    } finally {
      removeThinking();  // clean up if stream ended without a done/error event
      setStreaming(false);
    }

    function handleEvent(event) {
      switch (event.type) {

        case 'thinking':
          if (!thinkingEl) {
            thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          }
          break;

        case 'token':
          removeThinking();
          setStatus('Writing…');
          if (!assistantBubble) {
            assistantBubble = addMessage('assistant', '').parentElement.querySelector('.bubble');
            rawContent = '';
          }
          rawContent += event.content;
          assistantBubble.innerHTML =
            renderMarkdown(rawContent) + '<span class="cursor"></span>';
          scrollToBottom();
          break;

        case 'search_start':
          removeThinking();
          setStatus(`Searching: ${event.query}`);
          if (assistantBubble) {
            assistantBubble.innerHTML = renderMarkdown(rawContent);
            assistantBubble = null;
            rawContent = '';
          }
          currentSearchChip = addStatusChip(
            'search-status',
            `<span class="spinner"></span> Searching: <strong>${escapeHtml(event.query)}</strong>`
          );
          break;

        case 'search_done':
          setStatus('Thinking…');
          if (currentSearchChip) {
            const icon = event.count > 0 ? '✅' : '⚠️';
            const label = event.count > 0
              ? `Found ${event.count} result${event.count !== 1 ? 's' : ''}`
              : 'No results';
            currentSearchChip.innerHTML =
              `${icon} ${label} for <strong>${escapeHtml(event.query)}</strong>`;
            currentSearchChip = null;
          }
          thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          break;

        case 'rag_indexing':
          removeThinking();
          setStatus(`Indexing: ${event.name}`);
          currentSearchChip = addStatusChip(
            'search-status',
            `<span class="spinner"></span> Indexing: <strong>${escapeHtml(event.name)}</strong>`
          );
          break;

        case 'rag_done':
          if (currentSearchChip) {
            currentSearchChip.innerHTML =
              `📚 Indexed ${event.chunks} chunks — <strong>${escapeHtml(event.name)}</strong>`;
            currentSearchChip = null;
          }
          ragDocuments.set(event.name, event.chunks);
          renderRagDocs();
          thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          break;

        case 'heartbeat':
          break; // keep-alive: no UI action needed

        case 'warning':
          addStatusChip('warning-msg', `⚠️ ${escapeHtml(event.message)}`);
          break;

        case 'done':
          removeThinking();
          if (assistantBubble) {
            assistantBubble.innerHTML = renderMarkdown(rawContent);
            assistantBubble = null;
          } else if (event.content) {
            // tokens weren't streamed — render from done payload instead
            const b = addMessage('assistant', renderMarkdown(event.content));
          }
          rawContent = '';
          scrollToBottom();
          break;

        case 'error':
          removeThinking();
          if (assistantBubble) {
            assistantBubble.innerHTML = renderMarkdown(rawContent);
            assistantBubble = null;
          }
          addStatusChip('error-msg', `❌ ${escapeHtml(event.message)}`);
          break;
      }
    }

    function removeThinking() {
      if (thinkingEl) {
        thinkingEl.closest('.message')?.remove();
        thinkingEl = null;
      }
    }
  }

  function setStreaming(val, label) {
    isStreaming = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
    attachBtn.disabled = val;
    statusBar.style.display = val ? 'flex' : 'none';
    if (val && label) statusText.textContent = label;
  }

  function setStatus(label) {
    statusText.textContent = label;
  }

  function renderMarkdown(text) {
    try { return marked.parse(text); } catch { return `<pre>${escapeHtml(text)}</pre>`; }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
