<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ollama Search Tool</title>
  <script src="/static/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --accent: #2563eb;
      --search-bg: #eff6ff;
      --search-border: #bfdbfe;
      --search-text: #1d4ed8;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #dc2626;
      --code-bg: #f3f4f6;
      --radius: 12px;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: row;   /* sidebar + main side-by-side */
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1f2937;
    }

    #newConvBtn {
      margin: 10px;
      padding: 8px 12px;
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #newConvBtn:hover { background: #374151; }

    #convList {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 8px;
    }

    .conv-item {
      padding: 9px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .conv-item:hover   { background: #1f2937; }
    .conv-item.active  { background: #1e3a5f; border-left-color: #3b82f6; }

    .conv-title {
      font-size: 13px;
      color: #e5e7eb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-item.active .conv-title { color: #93c5fd; }

    .conv-time {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    .conv-delete {
      display: none;
      float: right;
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
    }
    .conv-item:hover .conv-delete { display: inline; }
    .conv-delete:hover { color: #ef4444; }

    /* ── Main area (header + chat + footer) ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-left .logo { font-size: 20px; }

    .header-left .title {
      font-weight: 600;
      font-size: 15px;
    }

    .model-badge {
      background: var(--code-bg);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* ── Status line badges (token counts + context %) ── */
    .stat-badge {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--code-bg);
      color: var(--text-muted);
      transition: background 0.3s, color 0.3s;
      white-space: nowrap;
    }
    .stat-badge.ctx-warn   { background: #dc2626; color: #fff; }
    .stat-badge.ctx-danger { background: #1f2937; color: #fff; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .verbose-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .verbose-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Global status bar ── */
    #statusBar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: #eff6ff;
      border-bottom: 1px solid #bfdbfe;
      font-size: 12px;
      color: #1d4ed8;
      flex-shrink: 0;
    }

    #statusBar .bar-spinner {
      width: 13px;
      height: 13px;
      border: 2px solid #bfdbfe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      will-change: transform;
      flex-shrink: 0;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      /* scroll-behavior intentionally omitted — set per-call in scrollToBottom() */
    }

    .messages {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* Markdown inside assistant bubbles */
    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 14px 0 6px; font-size: 1em; font-weight: 600; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      font-size: 0.88em;
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .bubble strong { font-weight: 600; }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .bubble th { background: var(--code-bg); font-weight: 600; }

    /* Blinking cursor during stream */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text-muted);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .thinking .t-spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      will-change: transform;
      flex-shrink: 0;
    }

    /* ── Search status chip ── */
    .search-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      color: var(--search-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    .search-status.clickable {
      cursor: pointer;
      user-select: none;
    }
    .search-status.clickable:hover { filter: brightness(0.95); }

    .search-status .spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--search-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      will-change: transform;
      flex-shrink: 0;
    }

    /* ── Sources list (collapsible under search chip) ── */
    .sources-list {
      display: none;
      margin: 4px 0 0 0;
      padding: 6px 10px 6px 24px;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      border-radius: var(--radius-sm);
      align-self: flex-start;
      max-width: 560px;
      list-style: disc;
    }
    .sources-list.open { display: block; }
    .sources-list li { margin-bottom: 3px; }
    .sources-list a {
      font-size: 12px;
      color: var(--search-text);
      text-decoration: none;
      word-break: break-word;
    }
    .sources-list a:hover { text-decoration: underline; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error chip ── */
    .error-msg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    /* ── Fetch context chip (pages read) ── */
    .fetch-context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      color: var(--search-text);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
      cursor: pointer;
      user-select: none;
    }
    .fetch-context-chip:hover { filter: brightness(0.95); }

    .fetch-items-list {
      display: none;
      margin: 4px 0 0 0;
      padding: 8px 12px;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      border-radius: var(--radius-sm);
      align-self: flex-start;
      max-width: 560px;
    }
    .fetch-items-list.open { display: flex; flex-direction: column; gap: 8px; }
    .fetch-item { font-size: 12px; color: var(--search-text); }
    .fetch-item-url { font-weight: 600; margin-bottom: 2px; word-break: break-all; }
    .fetch-item-url a { color: inherit; text-decoration: none; }
    .fetch-item-url a:hover { text-decoration: underline; }
    .fetch-item-preview { font-style: italic; opacity: 0.75; word-break: break-word; }

    /* ── RAG context chip (sources used) ── */
    .rag-context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
      cursor: pointer;
      user-select: none;
    }
    .rag-context-chip:hover { filter: brightness(0.95); }

    /* ── RAG chunks list (collapsible) ── */
    .rag-chunks-list {
      display: none;
      margin: 4px 0 0 0;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: var(--radius-sm);
      align-self: flex-start;
      max-width: 560px;
    }
    .rag-chunks-list.open { display: flex; flex-direction: column; gap: 8px; }
    .rag-chunk-item { font-size: 12px; color: #166534; }
    .rag-chunk-source { font-weight: 600; margin-bottom: 2px; }
    .rag-chunk-preview { font-style: italic; opacity: 0.75; word-break: break-word; }

    /* ── Warning chip ── */
    .warning-msg {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 99px;
      align-self: flex-start;
    }

    /* ── Input area ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* RAG documents panel */
    #ragDocs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 2px;
    }

    .rag-doc-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 99px;
      padding: 3px 10px 3px 8px;
      font-size: 12px;
      color: #166534;
    }

    .rag-doc-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: #4ade80;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .rag-doc-chip button:hover { color: #166534; }

    /* File chips row */
    #fileChips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px 3px 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .file-chip button:hover { color: var(--text); }

    .path-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 99px;
      padding: 3px 10px 3px 8px;
      font-size: 12px;
      color: #1d4ed8;
    }

    .path-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: #93c5fd;
      font-size: 13px;
      padding: 0;
      line-height: 1;
    }

    .path-chip button:hover { color: #1d4ed8; }

    /* ── Folder browser modal ── */
    .folder-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .folder-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 600px;
      max-width: 95vw;
      height: 70vh;
      max-height: 600px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .folder-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .folder-modal-title { font-weight: 600; font-size: 14px; }

    .folder-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px; padding: 0; line-height: 1;
    }
    .folder-close:hover { color: var(--text); }

    .folder-path-bar {
      padding: 7px 16px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow-x: auto;
      display: flex;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
    }

    .fp-seg { cursor: pointer; color: var(--accent); }
    .fp-seg:hover { text-decoration: underline; }
    .fp-cur { color: var(--text); }
    .fp-sep { color: var(--border); margin: 0 1px; }

    .folder-filter-row {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .folder-filter-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text);
      background: var(--surface);
      outline: none;
    }
    .folder-filter-row input:focus { border-color: var(--accent); }

    .folder-filter-warn {
      font-size: 11px;
      color: #dc2626;
      white-space: nowrap;
    }

    .folder-entries {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .fe-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .fe-row:hover { background: var(--bg); }
    .fe-row.fe-selected { background: #eff6ff; }
    .fe-row.fe-disabled { opacity: 0.35; cursor: not-allowed; }
    .fe-row.fe-disabled:hover { background: none; }
    .fe-row input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }

    .fe-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fe-dir  { color: var(--accent); font-weight: 500; }

    .folder-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
    }

    #folderSelCount { font-size: 12px; color: var(--text-muted); }

    .folder-footer-btns { display: flex; gap: 8px; }

    .folder-btn-cancel {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 5px 14px;
      font-size: 13px; cursor: pointer; color: var(--text-muted);
    }
    .folder-btn-cancel:hover { border-color: var(--accent); color: var(--accent); }

    .folder-btn-add {
      background: var(--accent); border: none;
      border-radius: var(--radius-sm); padding: 5px 14px;
      font-size: 13px; cursor: pointer; color: #fff; font-weight: 500;
    }
    .folder-btn-add:disabled { opacity: 0.45; cursor: not-allowed; }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #attachBtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 11px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    #attachBtn:hover { border-color: var(--accent); color: var(--accent); }
    #attachBtn:disabled { opacity: 0.4; cursor: default; }

    #pathBtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 11px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    #pathBtn:hover { border-color: var(--accent); color: var(--accent); }
    #pathBtn:disabled { opacity: 0.4; cursor: default; }

    #input {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }

    #input::placeholder { color: var(--text-muted); }

    #sendBtn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #sendBtn:disabled { opacity: 0.4; cursor: default; }
    #sendBtn:not(:disabled):hover { opacity: 0.85; }

    #stopBtn {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      display: none;
      transition: opacity 0.15s;
    }
    #stopBtn:hover { opacity: 0.85; }

    /* ── Welcome state ── */
    .welcome {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
    }

    .welcome .welcome-icon { font-size: 40px; margin-bottom: 12px; }
    .welcome h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .welcome p { font-size: 13px; }
  </style>
</head>
<body>

<nav id="sidebar">
  <button id="newConvBtn">＋ New conversation</button>
  <div id="convList"></div>
</nav>

<div class="main-area">

<header>
  <div class="header-left">
    <span class="logo">🤖</span>
    <span class="title">ollama Search Tool</span>
    <span class="model-badge" id="modelBadge">gemma4:26b</span>
  </div>
  <div class="header-right">
    <span class="stat-badge" id="tokenBadge" title="Total session tokens: input / output">↑0k ↓0k</span>
    <span class="stat-badge" id="ctxBadge" title="Context window usage (64k)">ctx:0%</span>
    <label class="verbose-label">
      <input type="checkbox" id="verboseToggle"> Verbose
    </label>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>
</header>

<div id="statusBar">
  <div class="bar-spinner"></div>
  <span id="statusText">Thinking…</span>
</div>

<div id="chat">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🔍</div>
      <h2>Ask anything</h2>
      <p>I'll search the web when I need up-to-date information.</p>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrapper">
    <div id="ragDocs" style="display:none"></div>
    <div id="fileChips" style="display:none"></div>
    <div class="input-row">
      <button id="attachBtn" title="Upload file">📎</button>
      <button id="pathBtn" title="Browse server files">📂</button>
      <input type="file" id="fileInput" hidden multiple
        accept=".pdf,.html,.htm,.txt,.md,.py,.js,.ts,.json,.csv,.png,.jpg,.jpeg,.gif,.webp">
      <textarea id="input" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button id="sendBtn">Send</button>
      <button id="stopBtn">Stop</button>
    </div>
  </div>
</footer>

</div><!-- /.main-area -->

<!-- ── Folder browser modal ─────────────────────────────────────────────── -->
<div id="folderOverlay" class="folder-overlay" style="display:none">
  <div class="folder-modal">
    <div class="folder-modal-header">
      <span class="folder-modal-title">Browse files</span>
      <button class="folder-close" id="folderClose" title="Close">✕</button>
    </div>
    <div class="folder-path-bar" id="folderPathBar"></div>
    <div class="folder-filter-row">
      <input id="folderExtInput" type="text"
        placeholder="Extensions to allow: pdf, txt, py  (blank = all)">
      <span class="folder-filter-warn" id="folderWarn"></span>
    </div>
    <div class="folder-entries" id="folderEntries"></div>
    <div class="folder-modal-footer">
      <span id="folderSelCount">0 selected</span>
      <div class="folder-footer-btns">
        <button class="folder-btn-cancel" id="folderCancel">Cancel</button>
        <button class="folder-btn-add" id="folderAdd" disabled>Add files</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  const statusBar   = document.getElementById('statusBar');
  const statusText  = document.getElementById('statusText');
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('sendBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const verboseChk  = document.getElementById('verboseToggle');
  const welcomeEl   = document.getElementById('welcome');
  const modelBadge  = document.getElementById('modelBadge');
  const tokenBadge  = document.getElementById('tokenBadge');
  const ctxBadge    = document.getElementById('ctxBadge');
  const attachBtn      = document.getElementById('attachBtn');
  const pathBtn        = document.getElementById('pathBtn');
  const fileInput      = document.getElementById('fileInput');
  const folderOverlay  = document.getElementById('folderOverlay');
  const folderPathBar  = document.getElementById('folderPathBar');
  const folderExtInput = document.getElementById('folderExtInput');
  const folderWarnEl   = document.getElementById('folderWarn');
  const folderEntriesEl= document.getElementById('folderEntries');
  const folderSelCount = document.getElementById('folderSelCount');
  const folderAddBtn   = document.getElementById('folderAdd');
  const folderClose    = document.getElementById('folderClose');
  const folderCancel   = document.getElementById('folderCancel');
  const fileChipsEl    = document.getElementById('fileChips');
  const ragDocsEl      = document.getElementById('ragDocs');
  const stopBtn        = document.getElementById('stopBtn');

  let isStreaming = false;
  let activeReader = null;
  let wasCancelled = false;
  let stagedFiles = [];    // File objects staged for the next send
  let stagedPaths = [];    // Server-side paths staged for the next send
  let ragDocuments = new Map(); // name → chunk count, persists across turns
  let currentConvId = null;    // active conversation ID

  // ── Folder browser state ─────────────────────────────────────────────────
  let folderCurPath = '/';    // current directory shown in modal
  let folderSelected = new Set();   // selected file paths (absolute)
  let folderEntries = [];           // current directory listing from /browse
  let folderWarnTimer = null;       // timeout id for warning auto-clear
  // Buffered per-turn — set on rag_context event, consumed and appended in done handler
  let pendingRagContext = null;

  // ── Status line helpers ───────────────────────────────────────────────────
  function fmtK(n) { return Math.round(n / 1000) + 'k'; }

  function updateStats(inputTokens, outputTokens, ctxPct) {
    tokenBadge.textContent = `↑${fmtK(inputTokens)} ↓${fmtK(outputTokens)}`;
    ctxBadge.textContent = `ctx:${ctxPct}%`;
    ctxBadge.className = 'stat-badge';
    if (ctxPct > 70)      ctxBadge.classList.add('ctx-danger');
    else if (ctxPct > 55) ctxBadge.classList.add('ctx-warn');
  }

  // ── Sidebar ──────────────────────────────────────────────────────────────

  const convListEl  = document.getElementById('convList');
  const newConvBtn  = document.getElementById('newConvBtn');

  function fmtRelTime(ts) {
    const diff = Math.floor(Date.now() / 1000) - ts;
    if (diff < 60)     return 'just now';
    if (diff < 3600)   return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400)  return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
    return new Date(ts * 1000).toLocaleDateString();
  }

  function renderConvList(conversations) {
    convListEl.innerHTML = '';
    for (const conv of conversations) {
      const item = document.createElement('div');
      item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
      item.dataset.id = conv.id;

      const delBtn = document.createElement('button');
      delBtn.className = 'conv-delete';
      delBtn.title = 'Delete';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (isStreaming) return;
        await fetch(`/conversations/${conv.id}`, { method: 'DELETE' });
        const resp = await fetch('/conversations');
        const data = await resp.json();
        // If the active conv was deleted the server picks the next one
        if (conv.id === currentConvId) {
          const remaining = data.conversations;
          if (remaining.length) {
            await switchConversation(remaining[0].id, false);
          } else {
            await newConversation();
            return;
          }
        }
        renderConvList(data.conversations);
      });

      const titleEl = document.createElement('div');
      titleEl.className = 'conv-title';
      titleEl.textContent = conv.title || 'New conversation';

      const timeEl = document.createElement('div');
      timeEl.className = 'conv-time';
      timeEl.textContent = fmtRelTime(conv.updated_at);

      item.appendChild(delBtn);
      item.appendChild(titleEl);
      item.appendChild(timeEl);

      item.addEventListener('click', () => {
        if (isStreaming || conv.id === currentConvId) return;
        switchConversation(conv.id);
      });

      convListEl.appendChild(item);
    }
  }

  async function loadConvList() {
    const resp = await fetch('/conversations');
    const data = await resp.json();
    renderConvList(data.conversations);
  }

  async function switchConversation(convId, updateList = true) {
    currentConvId = convId;
    // Load message history from DB and render
    const resp = await fetch(`/conversations/${convId}/messages`);
    const data = await resp.json();
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    ragDocuments.clear();
    renderRagDocs();
    updateStats(0, 0, 0);
    if (data.messages && data.messages.length > 0) {
      welcomeEl.style.display = 'none';
      for (const msg of data.messages) {
        const html = msg.role === 'assistant'
          ? renderMarkdown(msg.content)
          : escapeHtml(msg.content).replace(/\n/g, '<br>');
        addMessage(msg.role, html);
      }
    } else {
      welcomeEl.style.display = '';
    }
    scrollPinned = true;
    const chat = document.getElementById('chat');
    chat.style.scrollBehavior = 'auto';
    chat.scrollTop = chat.scrollHeight;
    chat.style.scrollBehavior = '';
    if (updateList) await loadConvList();
  }

  async function newConversation() {
    const resp = await fetch('/conversations', { method: 'POST' });
    const data = await resp.json();
    currentConvId = data.id;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
    ragDocuments.clear();
    renderRagDocs();
    updateStats(0, 0, 0);
    await loadConvList();
  }

  newConvBtn.addEventListener('click', () => {
    if (isStreaming) return;
    newConversation();
  });

  // ── Fetch initial status ─────────────────────────────────────────────────
  fetch('/status').then(r => r.json()).then(s => {
    modelBadge.textContent  = s.model;
    verboseChk.checked      = s.verbose;
    updateStats(s.input_tokens || 0, s.output_tokens || 0, s.context_pct || 0);
    if (s.home_dir) folderCurPath = s.home_dir;
    if (s.conv_id) {
      currentConvId = s.conv_id;
      loadConvList();
    }
  }).catch(() => {});

  // ── Auto-resize textarea ─────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  // ── Enter to send ─────────────────────────────────────────────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => { if (!isStreaming) sendMessage(); });

  // ── Reset (= new conversation, old one stays in sidebar) ─────────────────
  resetBtn.addEventListener('click', async () => {
    if (isStreaming) return;
    const resp = await fetch('/reset', { method: 'POST' });
    const data = await resp.json();
    currentConvId = data.conv_id;
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
    ragDocuments.clear();
    renderRagDocs();
    updateStats(0, 0, 0);
    await loadConvList();
  });

  // ── Stop ─────────────────────────────────────────────────────────────────
  stopBtn.addEventListener('click', async () => {
    wasCancelled = true;
    try { await fetch('/cancel', { method: 'POST' }); } catch (e) { /* ignore */ }
    if (activeReader) { activeReader.cancel(); activeReader = null; }
  });

  // ── Verbose toggle ────────────────────────────────────────────────────────
  verboseChk.addEventListener('change', () => {
    fetch('/verbose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: verboseChk.checked })
    });
  });

  // ── File attach ───────────────────────────────────────────────────────────
  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    for (const file of fileInput.files) {
      if (!stagedFiles.find(f => f.name === file.name)) {
        stagedFiles.push(file);
      }
    }
    fileInput.value = ''; // reset so same file can be re-added after removal
    renderFileChips();
  });

  // ── Folder browser ────────────────────────────────────────────────────────
  pathBtn.addEventListener('click', openFolderBrowser);
  folderClose.addEventListener('click', closeFolderBrowser);
  folderCancel.addEventListener('click', closeFolderBrowser);
  folderOverlay.addEventListener('click', e => { if (e.target === folderOverlay) closeFolderBrowser(); });
  folderExtInput.addEventListener('input', renderFolderEntries);
  folderAddBtn.addEventListener('click', commitFolderSelection);

  function openFolderBrowser() {
    folderSelected.clear();
    folderWarnEl.textContent = '';
    updateFolderSelCount();
    folderOverlay.style.display = 'flex';
    loadFolder(folderCurPath);
  }

  function closeFolderBrowser() {
    folderOverlay.style.display = 'none';
  }

  function commitFolderSelection() {
    for (const p of folderSelected) {
      if (!stagedPaths.includes(p)) stagedPaths.push(p);
    }
    renderFileChips();
    closeFolderBrowser();
  }

  async function loadFolder(path) {
    folderEntriesEl.innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">Loading…</div>';
    try {
      const res = await fetch(`/browse?path=${encodeURIComponent(path)}`);
      if (!res.ok) {
        const detail = (await res.json().catch(() => ({}))).detail || res.statusText;
        throw new Error(detail);
      }
      const data = await res.json();
      folderCurPath = data.path;
      folderEntries = data.entries;
      renderFolderPathBar(data);
      renderFolderEntries();
    } catch (e) {
      folderEntriesEl.innerHTML =
        `<div style="padding:20px;color:#dc2626;font-size:13px">⚠️ ${escapeHtml(e.message)}</div>`;
    }
  }

  function getExtFilter() {
    const raw = folderExtInput.value.trim();
    if (!raw) return [];
    return raw.split(/[\s,;]+/)
      .map(e => (e.startsWith('.') ? e.slice(1) : e).toLowerCase())
      .filter(Boolean);
  }

  function extMatches(entry, exts) {
    if (exts.length === 0) return true;          // no filter = all allowed
    if (!entry.ext) return false;                // no extension is never allowed when filter is set
    return exts.includes(entry.ext.slice(1));    // entry.ext is ".pdf", exts is ["pdf"]
  }

  function renderFolderEntries() {
    const exts = getExtFilter();
    folderEntriesEl.innerHTML = '';

    if (folderEntries.length === 0) {
      folderEntriesEl.innerHTML =
        '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">Empty directory</div>';
      return;
    }

    for (const entry of folderEntries) {
      const row = document.createElement('div');

      if (entry.is_dir) {
        row.className = 'fe-row';
        row.innerHTML = `<span>📁</span><span class="fe-name fe-dir">${escapeHtml(entry.name)}</span>`;
        row.addEventListener('click', () => loadFolder(entry.path));
      } else {
        const allowed = extMatches(entry, exts);
        const selected = folderSelected.has(entry.path);
        row.className = 'fe-row' + (allowed ? '' : ' fe-disabled') + (selected ? ' fe-selected' : '');

        if (allowed) {
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = selected;

          const icon = document.createElement('span');
          icon.textContent = '📄';

          const name = document.createElement('span');
          name.className = 'fe-name';
          name.textContent = entry.name;

          row.appendChild(cb);
          row.appendChild(icon);
          row.appendChild(name);

          const toggle = () => {
            const nowSelected = !folderSelected.has(entry.path);
            if (nowSelected) { folderSelected.add(entry.path); row.classList.add('fe-selected'); }
            else             { folderSelected.delete(entry.path); row.classList.remove('fe-selected'); }
            cb.checked = nowSelected;
            updateFolderSelCount();
          };
          cb.addEventListener('change', toggle);
          row.addEventListener('click', e => { if (e.target !== cb) toggle(); });
        } else {
          row.innerHTML = `<span>📄</span><span class="fe-name">${escapeHtml(entry.name)}</span>`;
          row.addEventListener('click', () => showFolderWarn(exts, entry.ext));
        }
      }

      folderEntriesEl.appendChild(row);
    }
  }

  function showFolderWarn(exts, ext) {
    const allowed = exts.map(e => `.${e}`).join(', ');
    const got = ext || '(no extension)';
    folderWarnEl.textContent = `⚠️ ${got} not allowed — only ${allowed}`;
    clearTimeout(folderWarnTimer);
    folderWarnTimer = setTimeout(() => { folderWarnEl.textContent = ''; }, 3500);
  }

  function updateFolderSelCount() {
    const n = folderSelected.size;
    folderSelCount.textContent = n === 0 ? '0 selected' : `${n} file${n !== 1 ? 's' : ''} selected`;
    folderAddBtn.disabled = n === 0;
  }

  function renderFolderPathBar(data) {
    folderPathBar.innerHTML = '';
    const segs = data.path.replace(/\\/g, '/').split('/').filter(Boolean);

    const addSep = () => {
      const s = document.createElement('span');
      s.className = 'fp-sep';
      s.textContent = '/';
      folderPathBar.appendChild(s);
    };

    // Root "/"
    const root = document.createElement('span');
    root.className = 'fp-seg';
    root.textContent = '/';
    root.title = '/';
    root.addEventListener('click', () => loadFolder('/'));
    folderPathBar.appendChild(root);

    let accumulated = '';
    segs.forEach((seg, i) => {
      accumulated += '/' + seg;
      addSep();
      const span = document.createElement('span');
      const segPath = accumulated;
      if (i === segs.length - 1) {
        span.className = 'fp-cur';
        span.textContent = seg;
      } else {
        span.className = 'fp-seg';
        span.textContent = seg;
        span.title = segPath;
        span.addEventListener('click', () => loadFolder(segPath));
      }
      folderPathBar.appendChild(span);
    });
  }

  // ── RAG document panel ────────────────────────────────────────────────────
  function renderRagDocs() {
    ragDocsEl.innerHTML = '';
    if (ragDocuments.size === 0) {
      ragDocsEl.style.display = 'none';
      return;
    }
    ragDocsEl.style.display = 'flex';
    ragDocuments.forEach((chunks, name) => {
      const chip = document.createElement('div');
      chip.className = 'rag-doc-chip';
      chip.innerHTML = `📚 ${escapeHtml(name)} <span style="opacity:.6">(${chunks} chunks)</span> <button aria-label="Remove">✕</button>`;
      chip.querySelector('button').addEventListener('click', async () => {
        await fetch(`/rag/documents/${encodeURIComponent(name)}`, { method: 'DELETE' });
        ragDocuments.delete(name);
        renderRagDocs();
      });
      ragDocsEl.appendChild(chip);
    });
  }

  // ── Fetch context panel ───────────────────────────────────────────────────
  function appendFetchContext(fetches, messageWrapper) {
    const n = fetches.length;
    const label = `${n} page${n !== 1 ? 's' : ''} read`;
    const arrow = `<span style="font-size:16px;line-height:1;margin-left:2px">▴</span>`;

    const chip = document.createElement('div');
    chip.className = 'fetch-context-chip';
    chip.innerHTML = `🌐 ${label} ${arrow}`;

    const list = document.createElement('div');
    list.className = 'fetch-items-list open';
    fetches.forEach(f => {
      const hostname = (() => { try { return new URL(f.url).hostname; } catch { return f.url; } })();
      const item = document.createElement('div');
      item.className = 'fetch-item';
      item.innerHTML =
        `<div class="fetch-item-url"><a href="${escapeHtml(f.url)}" target="_blank" rel="noopener noreferrer">🔗 ${escapeHtml(hostname)}</a> <span style="font-weight:400;opacity:.7">· ${(f.chars / 1000).toFixed(1)}k chars</span></div>` +
        `<div class="fetch-item-preview">${escapeHtml(f.preview)}</div>`;
      list.appendChild(item);
    });

    chip.addEventListener('click', () => {
      list.classList.toggle('open');
      const open = list.classList.contains('open');
      chip.innerHTML = `🌐 ${label} <span style="font-size:16px;line-height:1;margin-left:2px">${open ? '▴' : '▾'}</span>`;
    });

    messageWrapper.appendChild(chip);
    messageWrapper.appendChild(list);
  }

  // ── RAG context panel ─────────────────────────────────────────────────────
  function appendRagContext(chunks, messageWrapper) {
    const n = chunks.length;
    const label = `${n} document section${n !== 1 ? 's' : ''} used`;
    const arrow = `<span style="font-size:16px;line-height:1;margin-left:2px">▴</span>`;

    const chip = document.createElement('div');
    chip.className = 'rag-context-chip';
    chip.innerHTML = `📚 ${label} ${arrow}`;

    const list = document.createElement('div');
    list.className = 'rag-chunks-list open';
    chunks.forEach(c => {
      const item = document.createElement('div');
      item.className = 'rag-chunk-item';
      item.innerHTML =
        `<div class="rag-chunk-source">📄 ${escapeHtml(c.source)} <span style="font-weight:400;opacity:.7">· score: ${c.score.toFixed(2)}</span></div>` +
        `<div class="rag-chunk-preview">${escapeHtml(c.preview)}</div>`;
      list.appendChild(item);
    });

    chip.addEventListener('click', () => {
      list.classList.toggle('open');
      const open = list.classList.contains('open');
      chip.innerHTML = `📚 ${label} <span style="font-size:16px;line-height:1;margin-left:2px">${open ? '▴' : '▾'}</span>`;
    });

    messageWrapper.appendChild(chip);
    messageWrapper.appendChild(list);
  }

  function renderFileChips() {
    fileChipsEl.innerHTML = '';
    if (stagedFiles.length === 0 && stagedPaths.length === 0) {
      fileChipsEl.style.display = 'none';
      return;
    }
    fileChipsEl.style.display = 'flex';
    stagedFiles.forEach((file, idx) => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `📎 ${escapeHtml(file.name)} <button aria-label="Remove">✕</button>`;
      chip.querySelector('button').addEventListener('click', () => {
        stagedFiles.splice(idx, 1);
        renderFileChips();
      });
      fileChipsEl.appendChild(chip);
    });
    stagedPaths.forEach((path, idx) => {
      const chip = document.createElement('div');
      chip.className = 'path-chip';
      chip.innerHTML = `📂 ${escapeHtml(path)} <button aria-label="Remove">✕</button>`;
      chip.querySelector('button').addEventListener('click', () => {
        stagedPaths.splice(idx, 1);
        renderFileChips();
      });
      fileChipsEl.appendChild(chip);
    });
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function addMessage(role, html) {
    welcomeEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function addStatusChip(className, html) {
    welcomeEl.style.display = 'none';
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    const chip = document.createElement('div');
    chip.className = className;
    chip.innerHTML = html;
    wrapper.appendChild(chip);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return chip;
  }

  // Auto-scroll unless the user has scrolled up to read earlier content.
  //
  // Design: use 'wheel' events (not 'scroll') to detect upward user intent.
  // wheel/touchstart only fire from real user input — never from programmatic
  // scrollTop changes — so no guard flag or timing hacks are needed.
  //
  // scrollPinned = true  → follow the stream
  // scrollPinned = false → user wheeled up; leave them alone until they
  //                        scroll back near the bottom
  let scrollPinned = true;

  (function initScrollTracking() {
    const chat = document.getElementById('chat');

    // Unpin on upward wheel or touch-scroll.
    chat.addEventListener('wheel', (e) => {
      if (e.deltaY < 0) scrollPinned = false;
    }, { passive: true });
    chat.addEventListener('touchstart', () => { scrollPinned = false; }, { passive: true });

    // Re-pin when the user scrolls back to within 80 px of the bottom.
    chat.addEventListener('scroll', () => {
      const distFromBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight;
      if (distFromBottom < 80) scrollPinned = true;
    }, { passive: true });
  })();

  function scrollToBottom() {
    if (!scrollPinned) return;
    const chat = document.getElementById('chat');
    // Override smooth-scroll for this programmatic jump so no animation events
    // bleed into the scroll listener and accidentally flip scrollPinned.
    chat.style.scrollBehavior = 'auto';
    chat.scrollTop = chat.scrollHeight;
    chat.style.scrollBehavior = '';
  }

  // ── Send & stream ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && stagedFiles.length === 0) return;

    scrollPinned = true;   // re-pin for the new response
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Build user bubble: optional file/path chips + text
    const filesToSend = [...stagedFiles];
    const pathsToSend = [...stagedPaths];
    stagedFiles = [];
    stagedPaths = [];
    renderFileChips();

    let userHtml = '';
    const hasAttachments = filesToSend.length > 0 || pathsToSend.length > 0;
    if (filesToSend.length > 0) {
      userHtml += filesToSend.map(f =>
        `<div class="file-chip" style="margin-bottom:6px">📎 ${escapeHtml(f.name)}</div>`
      ).join('');
    }
    if (pathsToSend.length > 0) {
      userHtml += pathsToSend.map(p =>
        `<div class="path-chip" style="margin-bottom:6px">📂 ${escapeHtml(p)}</div>`
      ).join('');
    }
    if (text) userHtml += (hasAttachments ? '<br>' : '') + escapeHtml(text);
    addMessage('user', userHtml);

    setStreaming(true, 'Thinking…');

    // Thinking indicator
    let thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');

    let assistantBubble = null;
    let rawContent = '';
    let currentSearchChip = null;
    let pendingFetchContext = null; // set by fetch_context event, consumed in done handler
    let pendingRagContext = null;   // set by rag_context event, consumed in done handler

    try {
      // Use FormData so files can be included
      const form = new FormData();
      form.append('message', text || ' ');
      if (currentConvId) form.append('conversation_id', currentConvId);
      for (const file of filesToSend) form.append('files', file);
      for (const path of pathsToSend) form.append('paths', path);

      const response = await fetch('/chat', { method: 'POST', body: form });

      const reader = response.body.getReader();
      activeReader = reader;
      wasCancelled = false;
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }
          handleEvent(event);
        }
      }
    } catch (err) {
      if (!wasCancelled) {
        console.error('[SSE] stream error:', err);
        removeThinking();
        addStatusChip('error-msg', `❌ ${escapeHtml(err.message)}`);
      }
    } finally {
      activeReader = null;
      removeThinking();  // clean up if stream ended without a done/error event
      setStreaming(false);
    }

    function handleEvent(event) {
      switch (event.type) {

        case 'thinking':
          if (!thinkingEl) {
            thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          }
          break;

        case 'token':
          removeThinking();
          setStatus('Writing…');
          if (!assistantBubble) {
            assistantBubble = addMessage('assistant', '').parentElement.querySelector('.bubble');
            rawContent = '';
          }
          rawContent += event.content;
          // Preserve horizontal scroll of code blocks across re-renders.
          // innerHTML replacement resets scrollLeft to 0, which fights the
          // user if they're scrolling a wide block while tokens are arriving.
          const preScrolls = [...assistantBubble.querySelectorAll('pre')]
            .map(p => p.scrollLeft);
          assistantBubble.innerHTML =
            renderMarkdown(rawContent) + '<span class="cursor"></span>';
          assistantBubble.querySelectorAll('pre').forEach((p, i) => {
            if (preScrolls[i]) p.scrollLeft = preScrolls[i];
          });
          scrollToBottom();
          break;

        case 'search_start':
          removeThinking();
          setStatus(`Searching: ${event.query}`);
          if (assistantBubble) {
            assistantBubble.innerHTML = renderMarkdown(rawContent);
            assistantBubble = null;
            rawContent = '';
          }
          currentSearchChip = addStatusChip(
            'search-status',
            `<span class="spinner"></span> Searching: <strong>${escapeHtml(event.query)}</strong>`
          );
          break;

        case 'search_done': {
          setStatus('Thinking…');
          if (currentSearchChip) {
            const chip = currentSearchChip;
            currentSearchChip = null;

            const icon = event.count > 0 ? '✅' : '⚠️';
            const label = event.count > 0
              ? `Found ${event.count} result${event.count !== 1 ? 's' : ''}`
              : 'No results';
            const arrow = `<span style="font-size:16px;line-height:1;margin-left:2px">▴</span>`;
            chip.innerHTML =
              `${icon} ${label} for <strong>${escapeHtml(event.query)}</strong> ${arrow}`;

            if (event.results && event.results.length > 0) {
              chip.classList.add('clickable');

              const wrapper = chip.closest('.message');
              const sourcesList = document.createElement('ul');
              sourcesList.className = 'sources-list';
              event.results.forEach(r => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = r.url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = r.title || r.url;
                a.title = r.url;
                li.appendChild(a);
                sourcesList.appendChild(li);
              });
              sourcesList.classList.add('open');  // expanded by default
              wrapper.appendChild(sourcesList);

              chip.addEventListener('click', () => {
                sourcesList.classList.toggle('open');
                const open = sourcesList.classList.contains('open');
                const toggleArrow = `<span style="font-size:16px;line-height:1;margin-left:2px">${open ? '▴' : '▾'}</span>`;
                chip.innerHTML =
                  `${icon} ${label} for <strong>${escapeHtml(event.query)}</strong> ${toggleArrow}`;
              });
            }
          }
          thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          break;
        }

        case 'fetch_start': {
          removeThinking();
          const shortUrl = (() => { try { return new URL(event.url).hostname; } catch { return event.url; } })();
          setStatus(`Reading: ${shortUrl}`);
          currentSearchChip = addStatusChip(
            'search-status',
            `<span class="spinner"></span> Reading: <strong>${escapeHtml(shortUrl)}</strong>`
          );
          break;
        }

        case 'fetch_done': {
          setStatus('Thinking…');
          if (currentSearchChip) {
            const hostname = (() => { try { return new URL(event.url).hostname; } catch { return event.url; } })();
            currentSearchChip.innerHTML =
              `✅ Read ${(event.chars / 1000).toFixed(1)}k chars — <a href="${escapeHtml(event.url)}" target="_blank" rel="noopener noreferrer" style="color:inherit;font-weight:600">${escapeHtml(hostname)}</a>`;
            currentSearchChip = null;
          }
          thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          break;
        }

        case 'rag_indexing':
          removeThinking();
          setStatus(`Indexing: ${event.name}`);
          currentSearchChip = addStatusChip(
            'search-status',
            `<span class="spinner"></span> Indexing: <strong>${escapeHtml(event.name)}</strong>`
          );
          break;

        case 'rag_done':
          if (currentSearchChip) {
            currentSearchChip.innerHTML =
              `📚 Indexed ${event.chunks} chunks — <strong>${escapeHtml(event.name)}</strong>`;
            currentSearchChip = null;
          }
          ragDocuments.set(event.name, event.chunks);
          renderRagDocs();
          thinkingEl = addStatusChip('thinking', '<div class="t-spinner"></div> Thinking…');
          break;

        case 'fetch_context':
          // Buffer fetches; the panel is appended below the answer bubble in 'done'
          pendingFetchContext = event.fetches;
          break;

        case 'rag_context':
          // Buffer chunks; the panel is appended below the answer bubble in 'done'
          pendingRagContext = event.chunks;
          break;

        case 'stats':
          updateStats(event.input_tokens, event.output_tokens, event.context_pct);
          break;

        case 'title':
          // Update the sidebar item title without re-fetching the full list
          document.querySelectorAll('.conv-item').forEach(el => {
            if (el.dataset.id === event.conv_id) {
              el.querySelector('.conv-title').textContent = event.title;
            }
          });
          break;

        case 'compress':
          addStatusChip('warning-msg', `🗜️ ${escapeHtml(event.message)}`);
          break;

        case 'heartbeat':
          break; // keep-alive: no UI action needed

        case 'warning':
          addStatusChip('warning-msg', `⚠️ ${escapeHtml(event.message)}`);
          break;

        case 'done': {
          removeThinking();
          let doneWrapper = null;
          if (assistantBubble) {
            doneWrapper = assistantBubble.closest('.message');
            assistantBubble.innerHTML = renderMarkdown(rawContent);
            assistantBubble = null;
          } else if (event.content) {
            // tokens weren't streamed — render from done payload instead
            const b = addMessage('assistant', renderMarkdown(event.content));
            doneWrapper = b.closest('.message');
          }
          if (pendingFetchContext && doneWrapper) {
            appendFetchContext(pendingFetchContext, doneWrapper);
            pendingFetchContext = null;
          }
          if (pendingRagContext && doneWrapper) {
            appendRagContext(pendingRagContext, doneWrapper);
            pendingRagContext = null;
          }
          rawContent = '';
          break;
        }

        case 'error':
          removeThinking();
          if (assistantBubble) {
            assistantBubble.innerHTML = renderMarkdown(rawContent);
            assistantBubble = null;
          }
          addStatusChip('error-msg', `❌ ${escapeHtml(event.message)}`);
          break;
      }
    }

    function removeThinking() {
      if (thinkingEl) {
        thinkingEl.closest('.message')?.remove();
        thinkingEl = null;
      }
    }
  }

  function setStreaming(val, label) {
    isStreaming = val;
    sendBtn.style.display = val ? 'none' : '';
    stopBtn.style.display = val ? 'inline-block' : 'none';
    inputEl.disabled = val;
    attachBtn.disabled = val;
    pathBtn.disabled = val;
    if (val) closeFolderBrowser(); // close folder modal if streaming starts
    statusBar.style.display = val ? 'flex' : 'none';
    if (val && label) statusText.textContent = label;
  }

  function setStatus(label) {
    statusText.textContent = label;
  }

  // Math rendering with KaTeX.
  //
  // Problem: marked.js parses content first, mangling LaTeX — underscores become
  // <em>, backslashes get escaped, etc.  Fix: extract math blocks into placeholders
  // BEFORE marked runs, then restore and render them with KaTeX AFTER.
  //
  // Supports both display math ($$...$$) and inline math ($...$).
  function renderMarkdown(text) {
    try {
      // 1. Protect math blocks from marked.
      const mathBlocks = [];
      const protect = src =>
        src
          .replace(/\$\$([\s\S]*?)\$\$/g, (m) => { mathBlocks.push(m); return `\x02MATH${mathBlocks.length - 1}\x03`; })
          .replace(/\$([^\$\n]+?)\$/g,    (m) => { mathBlocks.push(m); return `\x02MATH${mathBlocks.length - 1}\x03`; });

      // 2. Run marked on the protected text.
      let html = marked.parse(protect(text));

      // 3. Restore math blocks (marked may have HTML-encoded the placeholder chars — handle both).
      html = html.replace(/[\x02\u0002]MATH(\d+)[\x03\u0003]/g, (_, i) => mathBlocks[+i]);

      // 4. Let KaTeX render all $...$ and $$...$$ in a temp element.
      if (typeof renderMathInElement !== 'undefined') {
        const div = document.createElement('div');
        div.innerHTML = html;
        renderMathInElement(div, {
          delimiters: [
            { left: '$$', right: '$$', display: true  },
            { left: '$',  right: '$',  display: false },
          ],
          throwOnError: false,
        });
        return div.innerHTML;
      }
      return html;
    } catch {
      return `<pre>${escapeHtml(text)}</pre>`;
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
